name: Autogenerador WebGrabPlus

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-wg:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar archivos del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0' # Versión requerida por WebGrab+Plus moderno

    - name: Instalar WebGrab+Plus (Versión Linux .NET)
      run: |
        # Descargamos el binario oficial de Linux desde un mirror estable de GitHub
        wget https://github.com
        tar -zxvf WebGrabPlus_5.6_install.tar.gz
        
        # Mover los archivos necesarios a nuestra carpeta de trabajo
        cp -r WebGrabPlus/* . || true
        mkdir -p siteini.user
        cp elmundo.es.ini siteini.user/

    - name: Ejecutar WebGrab+Plus
      run: |
        # Ejecutar el programa nativo pasándole la configuración local (.)
        chmod +x WebGrab+Plus
        ./WebGrab+Plus .

    - name: Guardar la guía generada en GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add guiatv.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "EPG actualizada con WebGrab+" && git push)
