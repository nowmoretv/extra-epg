name: Autogenerador WebGrabPlus

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-wg:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar archivos del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Instalar WebGrab+Plus de forma nativa
      run: |
        # Instalamos WebGrabPlus directamente desde el registro oficial de paquetes de Microsoft NuGet
        dotnet tool install --global WebGrabPlus.CLI --version 5.6.0 || dotnet tool install --global WebGrabPlus.CLI
        
        # Creamos la carpeta interna que WebGrab exige para las recetas de canales
        mkdir -p siteini.user
        cp elmundo.es.ini siteini.user/

    - name: Ejecutar WebGrab+Plus
      run: |
        # Agregamos las herramientas globales al camino del sistema y ejecutamos apuntando a nuestra carpeta (.)
        export PATH="$PATH:$HOME/.dotnet/tools"
        webgrabplus .

    - name: Guardar la guía generada en GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add guiatv.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "EPG actualizada con WebGrab+" && git push)
