name: Autogenerador WebGrabPlus

on:
  schedule:
    - cron: '0 5 * * *' # Ejecución automática diaria a las 05:00 UTC
  workflow_dispatch: # Permite ejecución manual con un botón

jobs:
  run-wg:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar archivos del repositorio
      uses: actions/checkout@v4

    - name: Preparar carpetas para WebGrab+Plus
      run: |
        # El contenedor de WebGrab busca la configuración en una carpeta mapeada. 
        # Creamos las rutas correspondientes y copiamos tus archivos de configuración ahí.
        mkdir -p config/siteini.user
        cp WebGrab++.config.xml config/WebGrab++.config.xml
        cp elmundo.es.ini config/siteini.user/elmundo.es.ini

    - name: Ejecutar WebGrab+Plus mediante Docker oficial
      run: |
        # Corremos el contenedor oficial. Montamos nuestra carpeta local 'config' dentro de él.
        # Le ordenamos ejecutar el binario directamente apuntando al archivo de configuración.
        docker run --rm \
          -v ${{ github.workspace }}/config:/config \
          lscr.io/linuxserver/webgrabplus:latest \
          /app/dotnet/dotnet /app/wg++/bin.net/WebGrab+Plus.dll /config

    - name: Mover archivo EPG generado a la raíz
      run: |
        # El contenedor guarda el resultado dentro de la carpeta config. Lo movemos fuera.
        if [ -f config/guiatv.xml ]; then
          mv config/guiatv.xml .
        fi

    - name: Guardar la guía generada en GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add guiatv.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "EPG actualizada con WebGrab+ Docker" && git push)
