name: Autogenerador WebGrabPlus

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-wg:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar archivos del repositorio
      uses: actions/checkout@v4

    - name: Instalar WebGrab+Plus en el sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-runtime mono-utils wget
        # Descargamos la versión oficial
        wget http://webgrabplus.com
        tar -zxvf WebGrabPlus_V3.3_install.tar.gz
        cd WebGrabPlus.install && chmod +x install.sh && ./install.sh
        
    - name: Preparar entorno de ejecución
      run: |
        # Copiamos el ejecutable del programa a nuestra carpeta actual de trabajo
        cp -r ~/.WebGrab+Plus/* . || true
        # WebGrab+Plus moderno exige que las recetas .ini estén dentro de una carpeta llamada siteini.user
        mkdir -p siteini.user
        cp elmundo.es.ini siteini.user/

    - name: Ejecutar WebGrab+Plus
      run: |
        # Forzamos a Mono a ejecutar el programa pasándole la ruta exacta de la carpeta actual con el punto (.)
        mono WebGrab+Plus.exe .

    - name: Guardar la guía generada en GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add guiatv.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "EPG actualizada con WebGrab+" && git push)
